<main class="app-shell">
  <section class="header">
    <h1>Todo UI</h1>
    <p>Use the backend API at <code>/api</code> from this UI.</p>
  </section>

  <section class="status">
    <div *ngIf="message" class="message success">{{ message }}</div>
    <div *ngIf="error" class="message error">{{ error }}</div>
  </section>

  <section class="mode-switch">
    <button type="button" (click)="mode = 'login'">Login</button>
    <button type="button" (click)="mode = 'signup'">Signup</button>
  </section>

  <form (ngSubmit)="mode === 'signup' ? submitSignup() : submitLogin()" class="auth-form">
    <div *ngIf="mode === 'signup'" class="form-row">
      <label>Name</label>
      <input type="text" [(ngModel)]="name" name="name" required />
    </div>

    <div class="form-row">
      <label>Email</label>
      <input type="email" [(ngModel)]="email" name="email" required />
    </div>

    <div class="form-row">
      <label>Password</label>
      <input type="password" [(ngModel)]="password" name="password" required />
    </div>

    <div *ngIf="mode === 'signup'" class="form-row">
      <label>Confirm Password</label>
      <input type="password" [(ngModel)]="confirmPassword" name="confirmPassword" required />
    </div>

    <button type="submit">{{ mode === 'signup' ? 'Signup' : 'Login' }}</button>
  </form>

  <section class="todo-section" *ngIf="token">
    <h2>Your todos</h2>
    <button type="button" (click)="loadTodos()">Load Todos</button>
    <ul>
      <li *ngFor="let todo of todos">
        {{ todo.name }} - {{ todo.status }}
      </li>
    </ul>
  </section>
</main>

<style>
  :host { display: block; padding: 1rem; font-family: Arial, sans-serif; color: #2a2a2a; }
  .header { margin-bottom: 1rem; }
  h1 { margin: 0 0 0.5rem 0; }
  .status { margin-bottom: 1rem; }
  .message { padding: 0.75rem 1rem; border-radius: 0.5rem; margin-bottom: 0.75rem; }
  .success { background: #e6ffed; color: #0f5132; border: 1px solid #badbcc; }
  .error { background: #ffe6e6; color: #842029; border: 1px solid #f5c2c7; }
  .mode-switch { display: flex; gap: 0.5rem; margin-bottom: 1rem; }
  .mode-switch button { padding: 0.75rem 1rem; border: none; border-radius: 0.5rem; cursor: pointer; background: #0d6efd; color: white; }
  .auth-form { display: grid; gap: 0.75rem; max-width: 400px; margin-bottom: 1rem; }
  .form-row { display: grid; gap: 0.25rem; }
  label { font-weight: 600; }
  input { padding: 0.75rem; border: 1px solid #ccc; border-radius: 0.5rem; width: 100%; }
  button[type="submit"] { padding: 0.9rem 1.2rem; border: none; border-radius: 0.6rem; background: #198754; color: white; cursor: pointer; }
  .todo-section button { margin-bottom: 0.75rem; padding: 0.6rem 1rem; border: none; border-radius: 0.5rem; background: #0d6efd; color: white; cursor: pointer; }
  ul { padding-left: 1.25rem; margin: 0; }
  li { margin-bottom: 0.5rem; }
</style>
